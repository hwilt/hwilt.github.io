<!DOCTYPE html>
<html>
    <head>
        <title>Henry Wilt</title>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <button class="toggle-btn" id="toggleModeBtn">Light Mode</button>
        <h2>Henry Wilt, Software Engineer</h2>

        <div class="teaching-container">
            <h3>Teaching</h3>
            <p><b>2025-2026 Courses Taught:</b></p>
            <p>Ursinus College <i>Department of Math, Computer Science, and Statistics</i></p>
            <p><a href="Ursinus-CS474-Spring2026" target="_blank">CS 474</a>: Human Computer Interaction (Spring)</p>
        </div>
        
        <div class="resume-container">
            <h3>Resume</h3>
            <p>Can be downloaded <a href="documents/henry-wilt-2026.pdf" download>here</a></p>
        </div>
        
        <script>
            const btn = document.getElementById('toggleModeBtn');
            const body = document.body;

            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                btn.textContent = 'Light Mode';
            }

            btn.addEventListener('click', () => {
                body.classList.toggle('light-mode');
                if (body.classList.contains('light-mode')) {
                    btn.textContent = 'Dark Mode';
                    localStorage.setItem('theme', 'light');
                } else {
                    btn.textContent = 'Light Mode';
                    localStorage.setItem('theme', 'dark');
                }
            });
        </script>
    </body>
</html>
